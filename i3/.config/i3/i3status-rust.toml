icons_format = "{icon}"

[theme]
theme = "plain"

[[block]]
block = "cpu"
interval = 1
[[block.click]]
button = "left"
cmd = "missioncenter"

[[block]]
block = "memory"
format = " $icon $mem_used_percents "
format_alt = " $icon $mem_used $mem_total "
[[block.click]]
button = "left"
cmd = "missioncenter"
[[block.click]]
button = "right"
action = "toggle_format"

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 1
[block.format]
full = " $icon $timestamp.datetime(f:'%A %d %B %Y %I:%M:%S %p') "
[[block.click]]
button = "left"
cmd = "gnome-calendar"
