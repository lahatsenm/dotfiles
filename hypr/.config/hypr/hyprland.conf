##############################
### WINDOWS AND WORKSPACES ###
##############################

# see https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
#windowrule = match:class (Emacs), workspace 2 silent,
#windowrule = match:class (zen), workspace 3 silent,
windowrule = match:class (org.kde.dolphin), workspace 3 silent,
windowrule = match:class (brave-browser), workspace 2 silent,
#windowrule = match:class ^(libreoffice-.*)$, workspace 10 silent,
#windowrule = match:class (soffice), workspace 10 silent,

windowrule = match:class (org.pulseaudio.pavucontrol), float on,
windowrule = match:class (org.pulseaudio.pavucontrol), size 842 512,

windowrule = match:class (org.gnome.Calendar), float on,
windowrule = match:class (org.gnome.Calendar), size 1109 799,

windowrule = match:class (io.missioncenter.MissionCenter), float on,
windowrule = match:class (io.missioncenter.MissionCenter), size 1160 761,

windowrule = match:class (waypaper), float on,
windowrule = match:class (waypaper), size 882 965,

windowrule = match:class (org.kde.gwenview), float on,
windowrule = match:class (org.kde.gwenview), size 925 1001,

windowrule = match:class (io.github.Qalculate.qalculate-qt), float on,
windowrule = match:class (io.github.Qalculate.qalculate-qt), size 1104 787,

windowrule = animation popin,match:float 1

# Ignore maximize requests from apps
windowrule = match:class .*, suppress_event maximize, 

# Fix some dragging issues with XWayland
windowrule = match:class ^$,match:title ^$,match:xwayland 1,match:float 1,match:fullscreen 0,match:pin 0, match:focus 0,

