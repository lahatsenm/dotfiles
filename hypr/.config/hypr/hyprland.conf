################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1920x1080,auto,1

###################
### MY PROGRAMS ###
###################
# See https://wiki.hyprland.org/Configuring/Keywords/
$terminal = wezterm start
$fileManager = dolphin

# hyprpm PERMISSION
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# or programs like emacs, dolphin,...
exec-once = hyprpm reload -n
#exec-once = nm-applet --indicator &
#exec-once = elephant 
#exec-once = walker --gapplication-service
exec-once = vicinae server
exec-once = ~/.config/hypr/xdg-portal-hyprland
#exec-once = swww-daemon
exec-once = /usr/lib/polkit-kde-authentication-agent-1
#exec-once = ~/.config/hypr/scripts/wall.sh
exec-once = systemctl start NetworkManager
#exec-once = hypridle &
exec-once = flameshot & swayidle &
#exec-once = waybar --config ~/.config/waybar/hyprland/config --style ~/.config/waybar/hyprland/style.css &
exec-once = qs -c noctalia-shell --no-duplicate
#exec-once = $terminal
exec-once = emacs
exec-once = brave

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_MENU_PREFIX,plasma-
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = WARP_ENABLE_WAYLAND,1

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 6

    border_size = 2   # I don't know but sometimes I want this and sometimes I don't

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(2aa198ff) rgba(268bd2ff) 45deg
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
	#col.inactive_border = rgba(073642ff)

    # Set to true to enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # https://wiki.hyprland.org/Configuring/Tearing/
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 3  
        color = rgba(0,0,0,0.30)   # soft black with 35% opacity
    }
    
    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 3
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # https://wiki.hyprland.org/Configuring/Animations/
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    #bezier = hyprSmooth, 0.33, 0.82, 0.41, 1.00
    #bezier = maclike,    0.215, 0.61, 0.355, 1.00
    #bezier = butter, 0.23, 1.00, 0.32, 1.00
    #bezier = snapSmooth, 0.33, 0.82, 0.41, 1.00
    #bezier = niri_expo, 0.16, 1.00, 0.30, 1.00

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 5, smoothOut, slide
    animation = windowsMove, 1, 3, default
    animation = border, 1, 10, default
    animation = fade, 1, 3, smoothIn
    animation = fadeDim, 1, 3, smoothIn
    animation = workspaces, 0, 1.94, default
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true
    preserve_split = true
}
  
# https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
    orientation = right
}

scrolling {
    fullscreen_on_one_column = false
    explicit_column_widths = 0.5, 0.8, 0.98
    direction = right
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant = azerty
    kb_model =
    kb_options = #ctrl:swapcaps
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
	    middle_button_emulation = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe_forever = true
}

# Example per-device config
# https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

binds {
    movefocus_cycles_fullscreen = 1       
}

###################
###   PLUGINS   ###
###################

plugin {
    hy3 {
        tabs {
            border_width = 1
            col.active = rgba(073642ff)          
            col.active.border = rgba(2aa198ff)   
            col.active.text = rgba(eee8d5ff)     
            col.inactive = rgba(002b36ff)        
            col.inactive.border = rgba(073642ff) 
            col.inactive.text = rgba(657b83ff)   
            col.urgent = rgba(dc322fff)          
            col.urgent.border = rgba(b58900ff)   
            col.urgent.text = rgba(fdf6e3ff)     
            text_font = SF Pro Display Bold
            text_height = 12
            padding = 0
            radius = 0
        }
        autotile {
            enable = true
            trigger_width = 800
            trigger_height = 500
        }
    }
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
    }
    dynamic-cursors {
        mode = tilt
    }
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "ALT" key as main modifier

$ipc = qs -c noctalia-shell ipc call

# https://wiki.hyprland.org/Configuring/Binds/
bind = $mainMod, return, exec, $terminal
bind = $mainMod, q, killactive,
bind = $mainMod, t, togglefloating,
# Program launcher 
bind = $mainMod, SPACE, exec, vicinae toggle

bind = $mainMod, escape, fullscreen,
bind = $mainMod SHIFT, r, exec, hyprctl reload
bind = $mainMod, F7, exec, nm-connection-editor
bind = $mainMod SHIFT, F7, exec, wezterm start -- nmtui 
bind = $mainMod SHIFT, F11, exec, systemctl restart NetworkManager
bind = $mainMod, F12, exec, $ipc lockScreen lock
#bind = $mainMod SHIFT, q, exec, wlogout --protocol layer-shell
    
# Screenshot
bind = , PRINT, exec, flameshot gui
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = SHIFT, PRINT, exec, hyprshot -m region

# Move focus on window
#bind = $mainMod, l, layoutmsg, focus, r
#bind = $mainMod, h, layoutmsg, focus, l
#bind = CTRL, k, layoutmsg, focus, u
#bind = CTRL, j, layoutmsg, focus, d

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# AZERTY keyboard layout support
bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# AZERTY keyboard layout support
bind = $mainMod SHIFT, ampersand, movetoworkspace, 1
bind = $mainMod SHIFT, eacute, movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl, movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft, movetoworkspace, 5 
bind = $mainMod SHIFT, minus, movetoworkspace, 6
bind = $mainMod SHIFT, egrave, movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla, movetoworkspace, 9
bind = $mainMod SHIFT, agrave, movetoworkspace, 10

# Move window or group
bind = $mainMod SHIFT, up, movewindoworgroup, u
bind = $mainMod SHIFT, down, movewindoworgroup, d
bind = $mainMod SHIFT, left, movewindoworgroup, l
bind = $mainMod SHIFT, right, movewindoworgroup, r

# scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# quickshell bindings (noctalia)
bind = SUPER, S, exec, $ipc settings toggle
bind = SUPER, V, exec, $ipc launcher clipboard
bind = SUPER, W, exec, $ipc wallpaper toggle
bind = SUPER, P, exec, ~/scripts/pickcolor.sh
bind = SUPER, I, exec, $ipc idleInhibitor toggle
bind = SUPER, N, exec, $ipc notifications toggleHistory
bind = SUPER, C, exec, $ipc controlCenter toggle
bind = $mainMod SHIFT, Q, exec, $ipc sessionMenu toggle

# submap "resize"
bind=SUPER,R,submap,resize

# START "resize"
submap=resize

#binde=,l,resizeactive,20 0
#binde=,h,resizeactive,-20 0
binde=,k,resizeactive,0 -20
binde=,j,resizeactive,0 20

#binde=,right,resizeactive,20 0
#binde=,left,resizeactive,-20 0
binde=,up,resizeactive,0 -20
binde=,down,resizeactive,0 20

### layout: scrolling
binde=,l,layoutmsg, colresize +0.2
binde=,h,layoutmsg, colresize -0.2

binde=,right,layoutmsg, colresize +0.2
binde=,left,layoutmsg, colresize -0.2

# Reset binds
bind=,escape,submap,reset 
bind=SUPER,R,submap,reset 

submap=reset
# END "resize"

# submap "MAX" (maximize window)
bind=SUPER,m,exec,hyprctl dispatch submap MAX && hyprctl dispatch fullscreenstate 1 1

# START "MAX"
submap=MAX

# Allow workspace switching in "MAX"
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod, ampersand, workspace, 1
bind = $mainMod, eacute, workspace, 2
bind = $mainMod, quotedbl, workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft, workspace, 5
bind = $mainMod, minus, workspace, 6
bind = $mainMod, egrave, workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla, workspace, 9
bind = $mainMod, agrave, workspace, 10

# reset binds
bind=,escape,exec,hyprctl dispatch submap reset && hyprctl dispatch fullscreenstate 0 0
bind=SUPER,m,exec,hyprctl dispatch submap reset && hyprctl dispatch fullscreenstate 0 0

submap=reset
# END "MAX"

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = ,XF86AudioLowerVolume, exec, $ipc volume decrease
bindel = ,XF86AudioMute, exec, $ipc volume muteOutput
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = ,XF86MonBrightnessDown, exec, $ipc brightness decrease
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# hyprlang noerror true

